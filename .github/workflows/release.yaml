name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      new-release-published: ${{ steps.release.outputs.new-release-published }}
      new-release-version: ${{ steps.release.outputs.new-release-version }}
    steps:
      - name: Generate bot App token
        # Authenticate the semantic-release push as the dedicated bot
        # App (provisioned per the main-branch-hardening spec) instead
        # of the built-in `GITHUB_TOKEN`. Once the repo ruleset gains a
        # "require pull requests" rule, the App's installation token is
        # the identity we add to `bypass_actors` — keeping `GITHUB_TOKEN`
        # out of the bypass list so no other workflow inherits direct
        # push rights to `main`.
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # `persist-credentials: false` would strip the actions/checkout
          # token from the git remote config, which semantic-release's
          # internal `git push` falls back to when no explicit token is
          # configured. Persist the App token so the push of the
          # version-bump commit authenticates as the bot App.
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Release
        id: release
        uses: open-turo/actions-jvm/release@v2
        with:
          github-token: ${{ steps.app-token.outputs.token }}

  distribute:
    name: Distribute Debug APK
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    # Gate access to the release-signing secrets behind the `release`
    # environment so they aren't readable from arbitrary workflows or
    # PR branches. The environment's deployment-branch policy should
    # be configured (in repo Settings → Environments → release) to
    # restrict to the `main` branch and protected tags, matching the
    # workflow's actual fire conditions (push to main + tag-driven
    # semantic-release runs).
    environment: release
    # Narrow this job's GITHUB_TOKEN to read-only — it only needs to
    # check out the repo and upload to Firebase. The workflow-level
    # write permissions exist for the `release` job (semantic-release
    # pushes a version-bump commit and may comment on issues / PRs);
    # `distribute` inherits them unless we override here. Limiting
    # the blast radius means a compromised step in this job (e.g. a
    # malicious action update) couldn't push to main or create issues.
    #
    # `id-token: write` is required for Workload Identity Federation:
    # the google-github-actions/auth step exchanges this job's OIDC
    # token for a short-lived Google access token. Without it the
    # auth step fails with "OIDC token endpoint not available".
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout post-bump main
        # Explicitly check out post-bump main so the build picks up
        # semantic-release's version-bump commit. Without ref:main we'd build
        # from the workflow's triggering SHA (pre-bump) and the APK's
        # versionName would lag the release notes.
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Capture built SHA
        # github.sha is the workflow's triggering SHA (pre-bump). After
        # checkout of main, HEAD is the post-bump commit — capture it so
        # the release notes match the APK actually being uploaded.
        id: built
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install firebase-tools
        # firebase-tools CLI replaces the firebase-appdistribution-gradle
        # plugin for FAD upload. The Gradle plugin (5.2.1) uses the
        # deprecated `com.google.api.client.googleapis.auth.oauth2
        # .GoogleCredential.fromStream`, which only dispatches on
        # `service_account` / `authorized_user` credential types — WIF
        # `external_account` JSONs throw on parse and the plugin
        # rethrows as the misleading "Service credentials file does not
        # exist." firebase-tools uses `GoogleAuth` from
        # `google-auth-library@^9.11` which dispatches on type natively
        # and handles `external_account` out of the box. Context in
        # nubecita-b6b6.
        #
        # Pinned to an exact patch version (vs `@14` major-pin) so
        # release-time installs are reproducible — a bad patch on the
        # latest 14.x line otherwise breaks the pipeline silently.
        # Renovate will propose bumps via the npm manager once the
        # Bundler/npm packageRules in nubecita-mcy7 land.
        run: npm install -g firebase-tools@14.27.0

      - name: Authenticate to Google Cloud (WIF)
        # Federated auth: exchange this workflow's OIDC token for a
        # short-lived Google access token + credentials file via
        # Workload Identity Federation. Replaces the previous
        # long-lived base64 service-account JSON secret
        # (`FIREBASE_SERVICE_ACCOUNT`). The action writes the
        # credentials to a temp file and exports
        # `GOOGLE_APPLICATION_CREDENTIALS` for downstream steps —
        # both firebase-tools (FAD upload) and fastlane / supply
        # (Play Console upload) read that env var natively via
        # `google-auth-library`.
        #
        # `workload_identity_provider` and `service_account` are
        # stored as `release` **environment** secrets (not repo
        # secrets) so they inherit the environment's deployment-
        # branch policy — only runs against `main` / protected tags
        # can read them. The values themselves aren't load-bearing
        # secrets (the GCP-side WIF binding is what gates token
        # impersonation), but env-scoping prevents PR-branch
        # workflow edits from exfiltrating them and gives us an
        # approval/wait-timer gate if we ever want one.
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Decode release keystore
        # Pass the secret through `env:` rather than interpolating into
        # the `run:` script directly — `${{ secrets.X }}` inlined into
        # a rendered shell command would let shell-active characters
        # in the secret execute as code. Reading via `$VAR` keeps the
        # value opaque to bash and GitHub still masks it in logs.
        # The decoded keystore lands at /tmp/release.jks and is fed to AGP
        # via the KEYSTORE_FILE env var that app/build.gradle.kts already
        # reads through its `keystoreValue()` helper. Signing the FAD debug
        # APK with this keystore is what makes Digital Asset Links
        # verification for the nubecita.app Android App Link succeed on
        # internal-tester installs (the keystore's SHA-256 fingerprint is
        # listed in https://nubecita.app/.well-known/assetlinks.json).
        #
        # The empty-secret check surfaces the root cause loudly: without
        # it a missing / unset secret silently decodes to an empty file
        # and the actual error appears deep in gradle's packageDebug
        # output as a generic "keystore not loaded" message.
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$RELEASE_KEYSTORE_BASE64" ]]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is empty or missing — check the 'release' environment is provisioned"
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
          if [[ ! -s /tmp/release.jks ]]; then
            echo "::error::Decoded keystore at /tmp/release.jks is empty — RELEASE_KEYSTORE_BASE64 is not valid base64"
            exit 1
          fi

      - name: Build debug APK
        # `GOOGLE_APPLICATION_CREDENTIALS` is exported by the
        # google-github-actions/auth step above; firebase-tools (next
        # step) reads it natively. The keystore env vars are consumed by
        # `app/build.gradle.kts`'s `keystoreValue()` helper: when all
        # four are present and the file exists, the `release`
        # signingConfig resolves and the debug buildType picks it up via
        # the conditional `signingConfig =` assignment in
        # `buildTypes.debug`.
        run: ./gradlew assembleDebug
        env:
          KEYSTORE_FILE: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload debug APK to Firebase App Distribution
        # FIREBASE_APP_ID lives as an environment variable on the
        # `release` environment (repo Settings → Environments →
        # release → Environment variables), scoped to runs that pass
        # the environment's deployment-branch policy. The app ID
        # isn't a secret (Firebase's package + SHA-1 threat model
        # already gates installs), but env-var-scoping keeps it
        # co-located with the WIF binding the same job consumes.
        env:
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          RELEASE_NOTES: "v${{ needs.release.outputs.new-release-version }} — ${{ steps.built.outputs.sha }}"
        run: |
          set -euo pipefail
          if [[ -z "$FIREBASE_APP_ID" ]]; then
            echo "::error::FIREBASE_APP_ID env var is empty — check the 'release' environment is provisioned with this variable"
            exit 1
          fi
          firebase appdistribution:distribute \
            app/build/outputs/apk/debug/app-debug.apk \
            --app "$FIREBASE_APP_ID" \
            --groups internal-testers \
            --release-notes "$RELEASE_NOTES"

  playstore:
    name: Upload Signed AAB to Play Console (internal track)
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    # Gating + permissions mirror `distribute` for the same reasons —
    # see that job's comments. Both jobs consume WIF-issued credentials,
    # so both need `id-token: write` and `environment: release`. The
    # two jobs run in parallel — no shared artifacts.
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout post-bump main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Capture built SHA
        id: built
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Ruby
        # `bundler-cache: true` reads .ruby-version + Gemfile.lock, restores
        # the bundler cache, and runs `bundle install --jobs 4 --retry 3`
        # so the fastlane step below can call `bundle exec` directly.
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install pandoc
        # The release-notes step below pipes the GitHub Release body
        # through `pandoc -f gfm -t plain --wrap=preserve`. pandoc isn't
        # preinstalled on current `ubuntu-latest` images, so install it
        # explicitly. The install adds ~10s to the release-only path.
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Authenticate to Google Cloud (WIF)
        # Same WIF binding the `distribute` job uses — the bound service
        # account holds both Firebase App Distribution and Play Console
        # Android Publisher permissions, so a single
        # `google-github-actions/auth` step covers both upload paths.
        # google-auth-library (bundled by fastlane via `googleauth`)
        # reads `GOOGLE_APPLICATION_CREDENTIALS` and handles the
        # `external_account` credential type natively; the Appfile
        # intentionally doesn't set `:json_key` so supply falls through
        # to ADC. See fastlane/README.md.
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$RELEASE_KEYSTORE_BASE64" ]]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is empty or missing — check the 'release' environment is provisioned"
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
          if [[ ! -s /tmp/release.jks ]]; then
            echo "::error::Decoded keystore at /tmp/release.jks is empty — RELEASE_KEYSTORE_BASE64 is not valid base64"
            exit 1
          fi

      - name: Build Play Console release notes from GitHub Release body
        # Fetch the rendered release notes that semantic-release wrote to
        # the GitHub Release body, transform markdown → plain text, and
        # truncate to Play Console's 500-char per-locale cap (with a small
        # buffer for a trailing ellipsis).
        #
        # Why fetch the GitHub Release body rather than the action output:
        # `open-turo/actions-jvm/release@v2` (the `release` job) wraps
        # `open-turo/actions-release/semantic-release@v5`, which DOES emit
        # `new-release-notes`, but the JVM wrapper drops that output and
        # only re-exposes published/version/major. The GitHub Release body
        # is the same content rendered by `@semantic-release/github`, and
        # it exists on the tag by the time this job runs (we `needs:
        # release`). One `gh api` + pandoc step is simpler than bypassing
        # the wrapper. Rationale + rejected alternatives recorded under
        # nubecita-kbmd.5.
        #
        # Fallback to the same `v<version> — <sha>` placeholder the
        # `distribute` job uses if the fetch fails or returns empty — a
        # release never goes out with empty release notes.
        id: release_notes
        env:
          VERSION: ${{ needs.release.outputs.new-release-version }}
          SHA: ${{ steps.built.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          fallback="v${VERSION} — ${SHA}"
          raw=$(gh api "repos/${REPO}/releases/tags/v${VERSION}" --jq .body 2>/dev/null || true)
          if [[ -z "$raw" || "$raw" == "null" ]]; then
            echo "::warning::GitHub Release body empty or missing for v${VERSION}; falling back to placeholder."
            notes="$fallback"
          else
            # pandoc is installed by the `Install pandoc` step above —
            # it isn't preinstalled on current `ubuntu-latest` images.
            # `--wrap=preserve` keeps semantic-release's hand-rolled
            # bullet structure readable.
            plain=$(printf '%s' "$raw" | pandoc -f gfm -t plain --wrap=preserve)
            # Truncate at 480 chars with a trailing ellipsis so the Fastfile's
            # defensive 500-char cap (PLAY_CHANGELOG_MAX_CHARS) never has to
            # cut mid-word. ${#plain} is a byte count, but release notes are
            # ASCII-dominant; the small margin absorbs the rare multi-byte
            # character without overrunning the Play Console cap.
            if (( ${#plain} > 480 )); then
              notes="${plain:0:480}…"
            else
              notes="$plain"
            fi
          fi
          {
            echo 'notes<<NOTES_EOF'
            echo "$notes"
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload AAB to Play Console internal track
        # `bundle exec fastlane internal` runs `gradle bundleRelease`
        # (signed by the keystore env vars below) then uploads the AAB
        # via supply. See fastlane/Fastfile for the lane shape.
        #
        # PLAY_RELEASE_NOTES is sourced from the previous step (rendered
        # GitHub Release body → plain text → truncated). The lane re-caps
        # at 500 chars defensively.
        run: bundle exec fastlane internal
        env:
          PLAY_RELEASE_NOTES: ${{ steps.release_notes.outputs.notes }}
          KEYSTORE_FILE: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
