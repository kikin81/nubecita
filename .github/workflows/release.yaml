name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      new-release-published: ${{ steps.release.outputs.new-release-published }}
      new-release-version: ${{ steps.release.outputs.new-release-version }}
    steps:
      - name: Generate bot App token
        # Authenticate the semantic-release push as the dedicated bot
        # App (provisioned per the main-branch-hardening spec) instead
        # of the built-in `GITHUB_TOKEN`. Once the repo ruleset gains a
        # "require pull requests" rule, the App's installation token is
        # the identity we add to `bypass_actors` — keeping `GITHUB_TOKEN`
        # out of the bypass list so no other workflow inherits direct
        # push rights to `main`.
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # `persist-credentials: false` would strip the actions/checkout
          # token from the git remote config, which semantic-release's
          # internal `git push` falls back to when no explicit token is
          # configured. Persist the App token so the push of the
          # version-bump commit authenticates as the bot App.
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Release
        id: release
        uses: open-turo/actions-jvm/release@v2
        with:
          github-token: ${{ steps.app-token.outputs.token }}

  distribute:
    name: Distribute Debug APK
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    # Gate access to the release-signing secrets behind the `release`
    # environment so they aren't readable from arbitrary workflows or
    # PR branches. The environment's deployment-branch policy should
    # be configured (in repo Settings → Environments → release) to
    # restrict to the `main` branch and protected tags, matching the
    # workflow's actual fire conditions (push to main + tag-driven
    # semantic-release runs).
    environment: release
    steps:
      - name: Checkout post-bump main
        # Explicitly check out post-bump main so the build picks up
        # semantic-release's version-bump commit. Without ref:main we'd build
        # from the workflow's triggering SHA (pre-bump) and the APK's
        # versionName would lag the release notes.
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Capture built SHA
        # github.sha is the workflow's triggering SHA (pre-bump). After
        # checkout of main, HEAD is the post-bump commit — capture it so
        # the release notes match the APK actually being uploaded.
        id: built
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode service account key
        # Pass the secret through `env:` instead of interpolating it
        # into the shell command directly. The previous shape inlined
        # `${{ secrets.FIREBASE_SERVICE_ACCOUNT }}` into the rendered
        # `run:` script; if the secret ever contained shell-active
        # characters (newlines, dollar signs, backticks) the substituted
        # command could execute parts of it as code. Reading via
        # `$FIREBASE_SA` keeps the value inside an environment variable that bash
        # treats as opaque data, and GitHub's secret-masking still
        # redacts it from logs.
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SA" | base64 -d > /tmp/firebase-sa-key.json

      - name: Decode release keystore
        # Same env-var-protected pattern as the Firebase SA decode above —
        # never interpolate the base64 secret directly into the `run:` script.
        # The decoded keystore lands at /tmp/release.jks and is fed to AGP
        # via the KEYSTORE_FILE env var that app/build.gradle.kts already
        # reads through its `keystoreValue()` helper. Signing the FAD debug
        # APK with this keystore is what makes Digital Asset Links
        # verification for the nubecita.app Android App Link succeed on
        # internal-tester installs (the keystore's SHA-256 fingerprint is
        # listed in https://nubecita.app/.well-known/assetlinks.json).
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > /tmp/release.jks

      - name: Build and distribute
        run: ./gradlew assembleDebug appDistributionUploadDebug
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa-key.json
          APP_DISTRIBUTION_RELEASE_NOTES: "v${{ needs.release.outputs.new-release-version }} — ${{ steps.built.outputs.sha }}"
          # Env vars consumed by app/build.gradle.kts's keystoreValue() helper.
          # When all four are present and the file exists, the `release`
          # signingConfig resolves and the debug buildType picks it up via
          # the conditional `signingConfig =` assignment in buildTypes.debug.
          KEYSTORE_FILE: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
