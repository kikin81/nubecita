# Nightly instrumented (connected androidTest) sweep.
#
# WHY THIS EXISTS
# ---------------
# The `instrumented` job in ci.yaml only runs `:app:connectedProductionDebugAndroidTest`
# — running every module's connected tests on one long-lived emulator crashes it
# (`Failed to start Emulator console` -> `Process crashed` cascading across modules,
# see the note in ci.yaml). So feature/core module androidTest is compiled on every
# PR (the "Compile instrumented (androidTest) sources" gate) but never RUN in CI,
# which is how it silently rots (nubecita-bknu). This workflow runs the full set
# nightly so runtime rot surfaces within a day instead of at the next manual sweep.
#
# STRUCTURE (V2 — parallel shards)
# --------------------------------
# Each module runs as its own matrix leg -> its own fresh runner + emulator, which is
# the only crash-safe way to cover many modules (no shared long-lived emulator). The
# matrix IS the shard unit; `max-parallel` fans the legs across runners.
# - `avd-warmup` boots the emulator once and saves the shared AVD snapshot cache
#   BEFORE the matrix fans out. Without it, on a cold cache all parallel legs miss and
#   each recreates the snapshot concurrently (wasted compute + a cache-write race).
#   With it, every leg restore-hits. (V1 ran `max-parallel: 1` and skipped the warmup;
#   nubecita-7fyv raised the parallelism.)
# - `max-parallel: 6` keeps well under the GitHub-hosted concurrent-job cap (Free = 20)
#   so the nightly doesn't starve other workflows; raise it for faster wall-clock if
#   the plan's concurrency allows. Wall-clock ~= warmup + ceil(16 / max-parallel) waves
#   of the slowest leg (down from ~80 min sequential).
#
# It is informational: `fail-fast: false` so one red module doesn't cancel the rest,
# and it gates nothing (nightly + manual only).
#
# AVD REUSE: emulator config (api35 / google_apis / pixel_6 / x86_64) and the AVD
# cache key (`avd-cache-v1-api35-pixel6`) match ci.yaml + macrobench.yaml so the
# cached snapshot is shared across all three workflows. Bump the key in all three
# (and here) together when the API level / profile changes.

name: Nightly instrumented tests

on:
  # Nightly at 06:00 UTC — offset from Macrobench (07:00) so the two scheduled
  # emulator workflows don't contend.
  schedule:
    - cron: "0 6 * * *"
  # Manual trigger — run the full sweep on demand without waiting for the cron.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  AVD_CACHE_KEY: avd-cache-v1-api35-pixel6

jobs:
  # One-shot: create + save the shared AVD snapshot cache so the parallel matrix legs
  # below all restore-hit instead of racing to recreate it on a cold cache.
  avd-warmup:
    name: Warm AVD cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Verify KVM is available
        run: |
          COUNT=$(grep -Ec '(vmx|svm)' /proc/cpuinfo)
          echo "vmx/svm flags: $COUNT"
          test "$COUNT" -gt 0 || { echo "::error::No KVM acceleration on this runner"; exit 1; }

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v6
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: ${{ env.AVD_CACHE_KEY }}

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD created and cached"

  instrumented-nightly:
    name: androidTest — ${{ matrix.module }}
    needs: avd-warmup
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      # Parallel shards. Tunable: raise for faster wall-clock if the plan's
      # concurrent-job cap allows (GitHub Free = 20); lower to be a quieter neighbour.
      max-parallel: 6
      matrix:
        module:
          - ":app"
          - ":core:database"
          - ":core:push"
          - ":core:update"
          - ":core:widget-sync"
          - ":designsystem"
          - ":feature:chats:impl"
          - ":feature:composer:impl"
          - ":feature:feed:impl"
          - ":feature:login:impl"
          - ":feature:moderation:impl"
          - ":feature:notifications:impl"
          - ":feature:onboarding:impl"
          - ":feature:profile:impl"
          - ":feature:search:impl"
          - ":feature:settings:impl"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Resolve the correct connected task for this module: flavored modules
      # (`:app`, feature :impl modules) expose `connectedProductionDebugAndroidTest`;
      # unflavored library modules only have `connectedDebugAndroidTest`. Detected
      # via `--dry-run` (builds the task graph, runs nothing) so the workflow
      # survives future flavor changes without a hand-maintained per-module map.
      - name: Resolve connected task
        id: task
        run: |
          MOD="${{ matrix.module }}"
          PROD="${MOD}:connectedProductionDebugAndroidTest"
          if ./gradlew "${PROD}" --dry-run -q >/dev/null 2>&1; then
            echo "task=${PROD}" >> "$GITHUB_OUTPUT"
          else
            echo "task=${MOD}:connectedDebugAndroidTest" >> "$GITHUB_OUTPUT"
          fi
          # Artifact names can't contain ':' or '/', so emit a filesystem-safe
          # module slug (e.g. ':feature:feed:impl' -> 'feature-feed-impl') for
          # the report upload name below.
          echo "slug=$(echo "${MOD#:}" | tr ':/' '--')" >> "$GITHUB_OUTPUT"
          echo "Resolved task: $(grep task= "$GITHUB_OUTPUT")"

      # Fail loud if the runner lacks hardware virtualization — without KVM the
      # emulator falls back to software rendering and is unusably slow/flaky, so
      # it's better to fail fast than burn minutes booting it. Mirrors macrobench.yaml.
      - name: Verify KVM is available
        run: |
          COUNT=$(grep -Ec '(vmx|svm)' /proc/cpuinfo)
          echo "vmx/svm flags: $COUNT"
          test "$COUNT" -gt 0 || { echo "::error::No KVM acceleration on this runner"; exit 1; }

      # KVM is needed for x86_64 emulator hardware acceleration on the
      # ubuntu-latest runner. Without this, emulator boot time goes from
      # ~30s to several minutes.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Restore-only: `avd-warmup` owns the save, so the parallel legs never race to
      # write the cache. If a restore somehow misses, the emulator-runner below
      # (force-avd-creation: false) creates the AVD on the fly — slower, but correct.
      - name: Restore AVD cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: ${{ env.AVD_CACHE_KEY }}

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew ${{ steps.task.outputs.task }}

      - name: Upload androidTest reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          # Named by module slug (from the resolve step) so a multi-red nightly
          # doesn't collide artifacts and the failing module is obvious.
          name: androidTest-reports-${{ steps.task.outputs.slug }}
          path: |
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
          if-no-files-found: ignore
          retention-days: 14
