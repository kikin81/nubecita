name: CI

on:
  workflow_dispatch:
  pull_request:
    # `labeled` is here so adding `run-instrumented` on a PR re-fires CI.
    # Other jobs are unaffected — they re-run identically; the
    # `instrumented` job's `if:` condition gates its execution on the
    # label's presence.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # `open-turo/actions-jvm/lint@v2` runs a semantic-release dry-run
    # and posts the projected release notes as a PR comment. That's why
    # both write scopes are required:
    #   - `pull-requests: write` — for the dry-run comment.
    #   - `contents: write` — semantic-release's analyze/notes plugins
    #     stage tag/changelog updates against the working tree as part
    #     of the dry-run, which the action treats as a write-class
    #     operation.
    # SHA-pinning the action (tracked as the medium-priority follow-up
    # in `docs/superpowers/specs/2026-05-17-main-branch-hardening.md`)
    # is the real mitigation here — narrowing the scopes any further
    # breaks the dry-run comment that reviewers rely on.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate bot App token
        # Dry-run-only test of the dedicated GitHub App we provisioned
        # for semantic-release (see
        # `docs/superpowers/specs/2026-05-17-main-branch-hardening.md`).
        # The lint job already runs semantic-release in dry-run mode
        # and posts the projected notes as a PR comment; swapping the
        # `github-token` from `GITHUB_TOKEN` to the App's installation
        # token here proves the App identity can do the read +
        # PR-comment work end-to-end. If the dry-run comment lands
        # under the App's `[bot]` identity on this PR, the same token
        # will work for the real release path in `release.yaml`.
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Action lint
        uses: open-turo/actions-jvm/lint@v2
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          checkout-repo: true

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Spotless + Android Lint + Sort Dependencies
        run: ./gradlew spotlessCheck lint :app:checkSortDependencies

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Unit tests with coverage
        run: ./gradlew jacocoTestReportAggregated

      - name: Coverage report
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: build/reports/jacoco/aggregated/jacocoTestReportAggregated.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 70
          update-comment: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        run: ./gradlew assembleDebug

  screenshot:
    name: Screenshot tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate screenshot tests
        id: validate
        run: ./gradlew :app:validateDebugScreenshotTest

      - name: Upload diff report on failure
        if: failure() && steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: screenshot-diff-report
          path: app/build/reports/screenshotTest/preview/debug/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment with diff report link on failure
        if: failure() && steps.validate.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- screenshot-diff-comment -->';
            const body = [
              marker,
              '## Screenshot test failures',
              '',
              'The `Screenshot tests` job detected pixel diffs versus the committed baselines.',
              '',
              `**Diff report**: download the \`screenshot-diff-report\` artifact from [this run](${process.env.RUN_URL}#artifacts) and open \`index.html\` to inspect side-by-side diffs.`,
              '',
              'If the changes are intentional, add the `update-baselines` label to this PR to regenerate baselines automatically.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Clean up stale failure comment on success
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- screenshot-diff-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const stale = comments.find(c => c.body && c.body.includes(marker));
            if (stale) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: stale.id });
            }

  instrumented:
    name: Instrumented tests
    # Slow + resource-heavy. Don't run on every PR — opt in via the
    # `run-instrumented` label, run unconditionally on push to main, and
    # let maintainers trigger manually via the workflow_dispatch button.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-instrumented'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # KVM is needed for x86_64 emulator hardware acceleration on the
      # ubuntu-latest runner. Without this, emulator boot time goes from
      # ~30s to several minutes.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cache the AVD snapshot so subsequent runs skip image creation.
      # Bump the cache key (e.g. `avd-cache-v2-...`) when the API level
      # or profile below changes.
      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-cache-v1-api35-pixel6

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD created and cached"

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest

      - name: Upload androidTest reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: androidTest-reports
          path: app/build/reports/androidTests/
          if-no-files-found: ignore
          retention-days: 14
