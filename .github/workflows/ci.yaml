name: CI

on:
  workflow_dispatch:
  pull_request:
    # `labeled` is here so adding `run-instrumented` on a PR re-fires CI.
    # Other jobs are unaffected — they re-run identically; the
    # `instrumented` job's `if:` condition gates its execution on the
    # label's presence.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The lint work is split into two PARALLEL jobs (nubecita-yz7o) so the long
  # Android Lint analysis no longer serializes behind pre-commit + the
  # release-notes dry-run + spotless. A final `lint` aggregator preserves the
  # "Lint" status-check name (so required-check config keeps resolving) and
  # fails if either parallel job fails.
  lint-checks:
    name: Lint / checks
    runs-on: ubuntu-latest
    # Release-notes preview (open-turo/actions-release/lint-release-notes@v5)
    # runs a semantic-release dry-run and posts a PR comment, so this job needs
    # write scopes:
    #   - `pull-requests: write` — the dry-run comment.
    #   - `contents: write` — semantic-release stages tag/changelog updates
    #     against the working tree during the dry-run (a write-class op).
    # SHA-pinning the actions (medium-priority follow-up in
    # `docs/superpowers/specs/2026-05-17-main-branch-hardening.md`) is the real
    # mitigation; narrowing further breaks the dry-run comment reviewers rely on.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup tools
        uses: open-turo/action-setup-tools@v3

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version

      # Needed because the pre-commit `spotless` + `openspec-validate` hooks
      # shell out to `./gradlew`, which requires the Android SDK + Gradle to
      # configure the build.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      # Runs on every PR (incl. forks): commitlint, gitleaks, actionlint,
      # end-of-file-fixer, spotless (`./gradlew spotlessApply` — the SINGLE
      # spotless enforcement; the `lint-android` job no longer re-runs
      # `spotlessCheck`), and openspec-validate. No `github-token` (only used
      # to clone private hook repos, which we don't have).
      - name: Pre-commit
        uses: open-turo/action-pre-commit@v3

      # App token + release-notes preview run only on same-repo PRs (fork PRs
      # can't see the bot secrets). Token generation is gated on the same
      # condition so the secrets aren't exercised on push / workflow_dispatch.
      - name: Generate bot App token
        id: app-token
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Release notes preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: open-turo/actions-release/lint-release-notes@v5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          checkout-repo: false

      - name: Sort dependencies
        run: ./gradlew :app:checkSortDependencies

  lint-android:
    name: Lint / android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      # The long pole — its own job so it runs in parallel with `lint-checks`.
      # spotless is NOT re-run here (the pre-commit spotless hook in
      # `lint-checks` is the single enforcement — dedup, nubecita-yz7o).
      # `:app:lintProductionDebug` is explicit because :app's `environment`
      # flavor dimension makes the unflavored `:app:lint` alias to
      # `:app:lintBenchDebug` (AGP picks the alphabetically-first flavor), which
      # would lint only the ~5-file bench shim and miss app/src/production/. The
      # top-level `lint` aggregator task still covers every non-flavored module.
      - name: Android Lint
        run: ./gradlew lint :app:lintProductionDebug

  # Aggregator: preserves the "Lint" status-check name and fails if either
  # parallel lint job genuinely FAILED. `if: always()` runs it even when a dep
  # failed (so a real failure can't slip through as a passing required check),
  # but it must fail ONLY on `failure` — NOT on `cancelled`/`skipped`. A
  # superseded run (concurrency `cancel-in-progress` on a label-add or rapid
  # push) cancels the lint sub-jobs; treating that as a failure would post a
  # spurious "Lint" failure on every superseded run (nubecita-3ion).
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [lint-checks, lint-android]
    if: always()
    steps:
      - name: Verify lint jobs succeeded
        run: |
          if [ "${{ needs.lint-checks.result }}" == "failure" ] || [ "${{ needs.lint-android.result }}" == "failure" ]; then
            echo "Lint failed — checks=${{ needs.lint-checks.result }} android=${{ needs.lint-android.result }}"
            exit 1
          fi
          echo "Lint OK — checks=${{ needs.lint-checks.result }} android=${{ needs.lint-android.result }}"

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Unit tests with coverage
        run: ./gradlew jacocoTestReportAggregated

      - name: Coverage report
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: build/reports/jacoco/aggregated/jacocoTestReportAggregated.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 70
          update-comment: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        # Same flavor-disambiguation reason as the connected-test pin below:
        # :app's `environment` dimension makes `assembleDebug` aggregate both
        # productionDebug + benchDebug. The bench APK isn't smoke-tested in
        # this job (and won't be until the Section-C scheduled bench pipeline
        # lands), so keep CI building only the production variant.
        run: ./gradlew assembleProductionDebug

      - name: Compile instrumented (androidTest) sources
        # The `instrumented` job only runs `:app`'s connected tests (and only on
        # main / labelled PRs), so a feature/core module's androidTest can rot
        # invisibly — a constructor change breaks its instrumentation test and no
        # PR ever compiles it. Compiling every module's androidTest sources here
        # (Kotlin + KSP/Hilt, no emulator, no dexing) catches those breaks —
        # both plain compile errors AND Hilt-graph `MissingBinding` failures —
        # on every PR. `*AndroidTestSources` is the AGP anchor that runs the
        # annotation processors without packaging a test APK.
        run: ./gradlew compileProductionDebugAndroidTestSources compileDebugAndroidTestSources

  screenshot:
    name: Screenshot tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate screenshot tests
        id: validate
        # `validateScreenshots` is a flavor-agnostic lifecycle alias the
        # `nubecita.android.library.compose` convention plugin registers in
        # every Compose library + feature module. It fans out to whichever
        # canonical debug-variant screenshot task that module has —
        # `validateDebugScreenshotTest` for non-flavored modules,
        # `validateProductionDebugScreenshotTest` for `environment`-flavored
        # ones (`:feature:feed:impl`, `:chats:impl`, `:profile:impl`,
        # `:search:impl`) — without hand-listing each flavored module here.
        # The bench flavor and release variants are deliberately excluded.
        # `:app` is intentionally NOT covered (its Mac-generated baselines are
        # a separately-tracked deferred gap).
        run: ./gradlew validateScreenshots

      - name: Upload diff report on failure
        if: failure() && steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: screenshot-diff-report
          path: "**/build/reports/screenshotTest/preview/debug/"
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment with diff report link on failure
        if: failure() && steps.validate.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- screenshot-diff-comment -->';
            const body = [
              marker,
              '## Screenshot test failures',
              '',
              'The `Screenshot tests` job detected pixel diffs versus the committed baselines.',
              '',
              `**Diff report**: download the \`screenshot-diff-report\` artifact from [this run](${process.env.RUN_URL}#artifacts) and open \`index.html\` to inspect side-by-side diffs.`,
              '',
              'If the changes are intentional, add the `update-baselines` label to this PR to regenerate baselines automatically.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Clean up stale failure comment on success
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- screenshot-diff-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const stale = comments.find(c => c.body && c.body.includes(marker));
            if (stale) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: stale.id });
            }

  instrumented:
    name: Instrumented tests
    # Slow + resource-heavy. Don't run on every PR — opt in via the
    # `run-instrumented` label, run unconditionally on push to main, and
    # let maintainers trigger manually via the workflow_dispatch button.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-instrumented'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # KVM is needed for x86_64 emulator hardware acceleration on the
      # ubuntu-latest runner. Without this, emulator boot time goes from
      # ~30s to several minutes.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cache the AVD snapshot so subsequent runs skip image creation.
      # Bump the cache key (e.g. `avd-cache-v2-...`) when the API level
      # or profile below changes.
      - name: AVD cache
        uses: actions/cache@v6
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-cache-v1-api35-pixel6

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD created and cached"

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # `:app` ships two product flavors (`production` + `bench`) since
          # nubecita-crmi.6, so `connectedDebugAndroidTest` is ambiguous and
          # must name the flavor. The instrumented suite runs against the
          # production flavor; the `bench` flavor (fake-network DI) is
          # exclusive to :benchmark Macrobench in the scheduled bench job.
          script: ./gradlew :app:connectedProductionDebugAndroidTest

      - name: Upload androidTest reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: androidTest-reports
          path: app/build/reports/androidTests/
          if-no-files-found: ignore
          retention-days: 14
