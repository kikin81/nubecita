name: CI

on:
  workflow_dispatch:
  pull_request:
    # `labeled` is here so adding `run-instrumented` on a PR re-fires CI.
    # Other jobs are unaffected — they re-run identically; the
    # `instrumented` job's `if:` condition gates its execution on the
    # label's presence.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # The Release-notes-preview step (open-turo/actions-release/
    # lint-release-notes@v5) runs a semantic-release dry-run and posts
    # the projected release notes as a PR comment. That's why both
    # write scopes are required:
    #   - `pull-requests: write` — for the dry-run comment.
    #   - `contents: write` — semantic-release's analyze/notes plugins
    #     stage tag/changelog updates against the working tree as part
    #     of the dry-run, which the action treats as a write-class
    #     operation.
    # SHA-pinning the actions (tracked as the medium-priority follow-up
    # in `docs/superpowers/specs/2026-05-17-main-branch-hardening.md`)
    # is the real mitigation here — narrowing the scopes any further
    # breaks the dry-run comment that reviewers rely on.
    permissions:
      contents: write
      pull-requests: write
    steps:
      # The open-turo `actions-jvm/lint@v2` composite bundles
      # checkout + setup-tools + setup-gradle + pre-commit +
      # release-notes-preview. Only the last step needs the App
      # token (to post a PR comment as the bot). Fork PRs can't see
      # the `BOT_APP_ID` / `BOT_PRIVATE_KEY` secrets, so we inline
      # the composite's steps here and gate just the App-token +
      # release-notes-preview on same-repo PRs. Pre-commit (which
      # enforces commitlint / gitleaks / actionlint / EOF-fixer)
      # runs on every PR including forks — otherwise a fork PR with
      # a non-Conventional commit would slip through CI and fail
      # the post-merge semantic-release.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup tools
        uses: open-turo/action-setup-tools@v3

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Pre-commit
        uses: open-turo/action-pre-commit@v3
        # No `github-token` — the input is only used to clone
        # private repos referenced by hooks, which we don't have.
        # Runs on every PR (incl. forks): commitlint, gitleaks,
        # actionlint, end-of-file-fixer, spotless, openspec-validate.

      # The App token is only consumed by `Release notes preview` below,
      # which itself only runs on same-repo PRs. Gate the token-generation
      # step on the same condition so we don't exercise the bot secrets on
      # `push` / `workflow_dispatch` events that have no consumer.
      - name: Generate bot App token
        id: app-token
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Release notes preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: open-turo/actions-release/lint-release-notes@v5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          checkout-repo: false

      - name: Spotless + Android Lint + Sort Dependencies
        # `:app:lintProductionDebug` is explicit because :app's `environment`
        # flavor dimension makes the unflavored `:app:lint` task alias to
        # `:app:lintBenchDebug` (AGP picks the alphabetically-first flavor),
        # so without this we'd lint the bench source set — which has only the
        # ~5-file fake-network shim — and miss every lint finding in the
        # production-flavor source under `app/src/production/`. The
        # top-level `lint` aggregator still covers every non-flavored module.
        run: ./gradlew spotlessCheck lint :app:lintProductionDebug :app:checkSortDependencies

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Unit tests with coverage
        run: ./gradlew jacocoTestReportAggregated

      - name: Coverage report
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: build/reports/jacoco/aggregated/jacocoTestReportAggregated.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 70
          update-comment: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        # Same flavor-disambiguation reason as the connected-test pin below:
        # :app's `environment` dimension makes `assembleDebug` aggregate both
        # productionDebug + benchDebug. The bench APK isn't smoke-tested in
        # this job (and won't be until the Section-C scheduled bench pipeline
        # lands), so keep CI building only the production variant.
        run: ./gradlew assembleProductionDebug

  screenshot:
    name: Screenshot tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate screenshot tests
        id: validate
        # `validateScreenshotTest` aggregates every variant on every
        # module — the unflavored `validateDebugScreenshotTest` form no
        # longer exists on flavored modules (`:feature:feed:impl` after
        # nubecita-xh99, `:core:auth` and `:core:preferences` after
        # nubecita-crmi.6 Section A1), so the old form silently skipped
        # those modules' `src/screenshotTest/` sources. The aggregator
        # covers both flavored and non-flavored modules; the flavored
        # ones run their tests once per flavor variant against the same
        # baseline (acceptable — bench/production share the screenshot
        # source set in practice).
        run: ./gradlew validateScreenshotTest

      - name: Upload diff report on failure
        if: failure() && steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: screenshot-diff-report
          path: "**/build/reports/screenshotTest/preview/debug/"
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment with diff report link on failure
        if: failure() && steps.validate.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- screenshot-diff-comment -->';
            const body = [
              marker,
              '## Screenshot test failures',
              '',
              'The `Screenshot tests` job detected pixel diffs versus the committed baselines.',
              '',
              `**Diff report**: download the \`screenshot-diff-report\` artifact from [this run](${process.env.RUN_URL}#artifacts) and open \`index.html\` to inspect side-by-side diffs.`,
              '',
              'If the changes are intentional, add the `update-baselines` label to this PR to regenerate baselines automatically.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Clean up stale failure comment on success
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- screenshot-diff-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const stale = comments.find(c => c.body && c.body.includes(marker));
            if (stale) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: stale.id });
            }

  instrumented:
    name: Instrumented tests
    # Slow + resource-heavy. Don't run on every PR — opt in via the
    # `run-instrumented` label, run unconditionally on push to main, and
    # let maintainers trigger manually via the workflow_dispatch button.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-instrumented'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # KVM is needed for x86_64 emulator hardware acceleration on the
      # ubuntu-latest runner. Without this, emulator boot time goes from
      # ~30s to several minutes.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cache the AVD snapshot so subsequent runs skip image creation.
      # Bump the cache key (e.g. `avd-cache-v2-...`) when the API level
      # or profile below changes.
      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-cache-v1-api35-pixel6

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD created and cached"

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # `:app` ships two product flavors (`production` + `bench`) since
          # nubecita-crmi.6, so `connectedDebugAndroidTest` is ambiguous and
          # must name the flavor. The instrumented suite runs against the
          # production flavor; the `bench` flavor (fake-network DI) is
          # exclusive to :benchmark Macrobench in the scheduled bench job.
          script: ./gradlew :app:connectedProductionDebugAndroidTest

      - name: Upload androidTest reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: androidTest-reports
          path: app/build/reports/androidTests/
          if-no-files-found: ignore
          retention-days: 14
