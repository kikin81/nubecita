name: Update Screenshot Baselines

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to regenerate baselines on"
        required: true
        type: string

concurrency:
  group: update-baselines-${{ github.event.pull_request.number || inputs.branch }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Regenerate baselines
    # Fork-PR guard: the `pull_request` trigger fires for forks too, and
    # this job runs Gradle code from the PR head. On a fork PR that
    # would let a malicious contributor's code execute on our runner
    # (read-only token still allows exfil of anything we put into the
    # job's environment in the future). Restrict the PR path to
    # same-repo branches; the `workflow_dispatch` path stays open for
    # manual reruns on any branch in this repo.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.label.name == 'update-baselines' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target ref
        id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          DISPATCH_BRANCH: ${{ inputs.branch }}
          DEFAULT_REPO: ${{ github.repository }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "ref=$PR_HEAD_REF" >> "$GITHUB_OUTPUT"
            echo "repo=$PR_HEAD_REPO" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$DISPATCH_BRANCH" >> "$GITHUB_OUTPUT"
            echo "repo=$DEFAULT_REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate bot App token
        # Authenticate the baseline-regen push as the dedicated bot App
        # (same pattern release.yaml uses for semantic-release's version-
        # bump push) instead of the built-in GITHUB_TOKEN. Pushes made
        # with GITHUB_TOKEN are blocked from firing downstream workflow
        # events as a recursion safeguard, so a baseline-regen commit
        # would land silently and CI would not re-run against the new
        # commit â€” leaving the PR stuck at "no checks reported" until a
        # human nudged it with close+reopen or an empty push. App
        # installation tokens are exempt from the recursion block, so the
        # auto-commit kicks off a `pull_request: synchronize` event and
        # CI re-runs without manual intervention. Context: nubecita-61iu.
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          repository: ${{ steps.ref.outputs.repo }}
          # actions/checkout persists this token in `.git/config`'s
          # extraheader so the subsequent `git push` inherits it.
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Regenerate baselines
        # `updateScreenshots` is the flavor-agnostic lifecycle alias the
        # `nubecita.android.library.compose` convention plugin registers in
        # every Compose library + feature module; it fans out to the right
        # canonical debug-variant update task per module (plain `Debug` for
        # non-flavored, `ProductionDebug` for `environment`-flavored). Mirrors
        # ci.yaml's `validateScreenshots` step so the same module set is
        # regenerated as is validated â€” no hand-listing of flavored modules.
        run: ./gradlew updateScreenshots

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage baselines for every module that has a screenshot test
          # reference dir. `find -exec git add --all {} +` is portable and
          # avoids the `**` glob trap (git's default pathspec treats `**`
          # literally without the `:(glob)` magic prefix, and quoting
          # suppresses shell expansion either way). `--all` makes deletion
          # staging explicit so removed baselines (e.g. a deleted test)
          # propagate into the commit too. Both the non-flavored
          # (`screenshotTestDebug`) and flavored (`screenshotTestProductionDebug`)
          # reference dirs are staged â€” the latter holds feed/chats/profile/
          # search baselines, which the old `screenshotTestDebug`-only find
          # silently skipped.
          find . -type d \
            \( -path '*/src/screenshotTestDebug/reference' \
               -o -path '*/src/screenshotTestProductionDebug/reference' \) \
            -exec git add --all {} +
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
            exit 0
          fi
          git commit -m "chore: regenerate screenshot baselines"
          git push

      - name: Remove trigger label
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'update-baselines'
            }).catch((err) => {
              if (err.status !== 404) throw err;
            });
