name: Update Screenshot Baselines

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to regenerate baselines on"
        required: true
        type: string

concurrency:
  group: update-baselines-${{ github.event.pull_request.number || inputs.branch }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Regenerate baselines
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'update-baselines')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target ref
        id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          DISPATCH_BRANCH: ${{ inputs.branch }}
          DEFAULT_REPO: ${{ github.repository }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "ref=$PR_HEAD_REF" >> "$GITHUB_OUTPUT"
            echo "repo=$PR_HEAD_REPO" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$DISPATCH_BRANCH" >> "$GITHUB_OUTPUT"
            echo "repo=$DEFAULT_REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          repository: ${{ steps.ref.outputs.repo }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Regenerate baselines
        run: ./gradlew :app:updateDebugScreenshotTest

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/screenshotTestDebug/reference
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
            exit 0
          fi
          git commit -m "chore: regenerate screenshot baselines"
          git push

      - name: Remove trigger label
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'update-baselines'
            }).catch((err) => {
              if (err.status !== 404) throw err;
            });
