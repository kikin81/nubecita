# Gitleaks configuration. Extends the default ruleset and allowlists files
# that legitimately contain "secret-shaped" values that are not actually
# secrets in our threat model.

[extend]
useDefault = true

[[allowlists]]
description = "Firebase google-services.json — the API key inside is package-name + SHA-1-fingerprint scoped, so a fork cannot authenticate as our app without our signing keystore. This is the standard Android+Firebase pattern even for public repos. See: https://firebase.google.com/support/troubleshooter/oauth-and-api-keys"
paths = [
    '''app/google-services\.json''',
]

[[allowlists]]
description = "AT Protocol TID record keys — 13-char base32-sortable strings ([2-7a-z]) used as the rkey segment in every app.bsky.feed.post URL (https://atproto.com/specs/tid). They are PUBLIC record identifiers, not secrets, but their alphabet + length put them above gitleaks' generic-api-key entropy threshold. Scoped to test source sets only — production code that happens to ship a 13-char [2-7a-z] string is almost certainly NOT a TID and should still be flagged. AND semantics: BOTH the path and the regex must match for suppression."
condition = "AND"
paths = [
    '''.*/src/test/.*''',
    '''.*/src/androidTest/.*''',
    '''.*/src/screenshotTest/.*''',
]
regexes = [
    '''^[2-7a-z]{13}$''',
]
