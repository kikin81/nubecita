<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Spacing scale</title>
<style>.card{padding:20px 24px;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.box{background:var(--sky-50);height:20px;border-radius:4px;}
.n{font:500 11px/1 var(--font-mono);color:var(--fg-3);min-width:36px;}
.key{font:600 11px/1 var(--font-body);min-width:32px;}
</style></head><body><div class="card">
<div class="title-medium" style="margin-bottom:10px">Spacing — 4pt scale</div>
<div class="row"><span class="key">s-1</span><div class="box" style="width:4px"></div><span class="n">4</span></div>
<div class="row"><span class="key">s-2</span><div class="box" style="width:8px"></div><span class="n">8</span></div>
<div class="row"><span class="key">s-3</span><div class="box" style="width:12px"></div><span class="n">12</span></div>
<div class="row"><span class="key">s-4</span><div class="box" style="width:16px"></div><span class="n">16</span></div>
<div class="row"><span class="key">s-6</span><div class="box" style="width:24px"></div><span class="n">24</span></div>
<div class="row"><span class="key">s-8</span><div class="box" style="width:32px"></div><span class="n">32</span></div>
<div class="row"><span class="key">s-12</span><div class="box" style="width:48px"></div><span class="n">48</span></div>
<div class="row"><span class="key">s-16</span><div class="box" style="width:64px"></div><span class="n">64</span></div>
</div></body></html>
