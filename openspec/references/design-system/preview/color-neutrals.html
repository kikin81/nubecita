<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Neutrals</title>
<style>
.card{padding:20px 24px;}
.scale{display:grid;grid-template-columns:repeat(14,1fr);gap:0;border-radius:var(--shape-md);overflow:hidden;height:56px;border:1px solid var(--outline-variant);}
.sw{display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font:600 10px/1 var(--font-body);}
.title-medium{margin-bottom:10px;}
.sub{margin-top:14px}
</style></head><body><div class="card">
<div class="title-medium">Neutrals</div>
<div class="scale">
<div class="sw" style="background:#000;color:#fff">0</div>
<div class="sw" style="background:#1A1B1F;color:#fff">10</div>
<div class="sw" style="background:#2E2F33;color:#fff">20</div>
<div class="sw" style="background:#45464A;color:#fff">30</div>
<div class="sw" style="background:#5D5E62;color:#fff">40</div>
<div class="sw" style="background:#76777B;color:#fff">50</div>
<div class="sw" style="background:#909094;color:#fff">60</div>
<div class="sw" style="background:#AAAAAE;color:#1A1B1F">70</div>
<div class="sw" style="background:#C6C6CA;color:#1A1B1F">80</div>
<div class="sw" style="background:#E2E2E6;color:#1A1B1F">90</div>
<div class="sw" style="background:#F0F0F4;color:#1A1B1F">95</div>
<div class="sw" style="background:#F8F9FC;color:#1A1B1F">98</div>
<div class="sw" style="background:#FCFCFF;color:#1A1B1F">99</div>
<div class="sw" style="background:#FFF;color:#1A1B1F">100</div>
</div>
<div class="title-medium sub">Neutral-variant (outlines)</div>
<div class="scale" style="grid-template-columns:repeat(4,1fr)">
<div class="sw" style="background:#43474E;color:#fff">30</div>
<div class="sw" style="background:#73777F;color:#fff">50</div>
<div class="sw" style="background:#C3C7CF;color:#1A1B1F">80</div>
<div class="sw" style="background:#DFE2EB;color:#1A1B1F">90</div>
</div>
</div></body></html>
