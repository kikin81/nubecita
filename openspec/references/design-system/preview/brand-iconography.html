<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Iconography</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"/>
<style>.card{padding:18px 24px;}
.row{display:flex;gap:22px;flex-wrap:wrap;}
.i{display:flex;flex-direction:column;align-items:center;gap:4px;font:500 10px/1 var(--font-mono);color:var(--fg-3);}
.i .material-symbols-rounded{font-size:28px;color:var(--fg-1);}
.i.active .material-symbols-rounded{font-variation-settings:'FILL' 1;color:var(--sky-50);}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
</style></head><body><div class="card">
<div class="hd"><div class="title-medium">Material Symbols Rounded</div><div class="mono">opsz 24 · wght 400 · FILL 0→1</div></div>
<div class="row">
<div class="i"><span class="material-symbols-rounded">home</span>home</div>
<div class="i active"><span class="material-symbols-rounded">home</span>home · active</div>
<div class="i"><span class="material-symbols-rounded">chat_bubble</span>reply</div>
<div class="i"><span class="material-symbols-rounded">repeat</span>repost</div>
<div class="i"><span class="material-symbols-rounded">favorite</span>like</div>
<div class="i active"><span class="material-symbols-rounded">favorite</span>liked</div>
<div class="i"><span class="material-symbols-rounded">share</span>share</div>
<div class="i"><span class="material-symbols-rounded">notifications</span>alerts</div>
<div class="i"><span class="material-symbols-rounded">search</span>search</div>
<div class="i"><span class="material-symbols-rounded">bookmark</span>save</div>
<div class="i"><span class="material-symbols-rounded">more_horiz</span>more</div>
<div class="i"><span class="material-symbols-rounded">edit</span>compose</div>
</div>
</div></body></html>
