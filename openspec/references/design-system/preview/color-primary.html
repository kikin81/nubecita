<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Primary scale</title>
<style>
.card{padding:20px 24px;}
.scale{display:grid;grid-template-columns:repeat(14,1fr);gap:0;border-radius:var(--shape-md);overflow:hidden;height:72px;}
.sw{display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font:600 10px/1 var(--font-body);}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.dot{width:18px;height:18px;border-radius:999px;background:var(--sky-50);box-shadow:0 0 0 2px var(--surface-container-lowest), 0 0 0 3px var(--sky-50);}
</style></head><body><div class="card">
<div class="header"><div class="row" style="gap:10px"><div class="dot"></div><div class="title-medium">Sky — primary key color</div></div><div class="mono">#0A7AFF @ tone 50</div></div>
<div class="scale">
<div class="sw" style="background:#000D1F;color:#fff">0</div>
<div class="sw" style="background:#001B33;color:#fff">10</div>
<div class="sw" style="background:#003155;color:#fff">20</div>
<div class="sw" style="background:#004880;color:#fff">30</div>
<div class="sw" style="background:#0062B1;color:#fff">40</div>
<div class="sw" style="background:#0A7AFF;color:#fff">50</div>
<div class="sw" style="background:#3F92FF;color:#fff">60</div>
<div class="sw" style="background:#6FAAFF;color:#fff">70</div>
<div class="sw" style="background:#A6C8FF;color:#001B33">80</div>
<div class="sw" style="background:#D6E3FF;color:#001B33">90</div>
<div class="sw" style="background:#EBF1FF;color:#001B33">95</div>
<div class="sw" style="background:#F7F9FF;color:#001B33">98</div>
<div class="sw" style="background:#FDFCFF;color:#001B33">99</div>
<div class="sw" style="background:#FFFFFF;color:#001B33;border-left:1px solid var(--outline-variant)">100</div>
</div>
</div></body></html>
