<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Nav bar + top app bar</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded"/>
<style>body{background:var(--surface-container-low)}.card{padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
.topbar{display:flex;align-items:center;gap:12px;height:56px;padding:0 16px;background:var(--surface);border-radius:12px;box-shadow:var(--elev-1);}
.topbar img{height:26px;}
.topbar .material-symbols-rounded{color:var(--fg-1);font-size:24px;}
.topbar .spacer{flex:1;}
.navbar{display:flex;align-items:center;justify-content:space-around;height:80px;background:var(--surface-container);border-radius:16px;padding:12px 8px;}
.nitem{display:flex;flex-direction:column;align-items:center;gap:4px;font:600 11px/1 var(--font-body);color:var(--fg-2);flex:1;}
.nitem .pill{height:32px;width:64px;display:flex;align-items:center;justify-content:center;border-radius:999px;}
.nitem.active .pill{background:var(--sky-90);}
.nitem.active{color:var(--sky-10);}
.nitem .material-symbols-rounded{font-size:22px;}
.nitem.active .material-symbols-rounded{font-variation-settings:'FILL' 1;color:var(--sky-10);}
</style></head><body><div class="card">
<div class="topbar"><span class="material-symbols-rounded">menu</span><img src="../assets/logomark.svg"/><span style="font:700 17px/1 var(--font-body)">nubecita</span><div class="spacer"></div><span class="material-symbols-rounded">search</span><span class="material-symbols-rounded">notifications</span></div>
<div class="navbar">
<div class="nitem active"><div class="pill"><span class="material-symbols-rounded">home</span></div>Home</div>
<div class="nitem"><div class="pill"><span class="material-symbols-rounded">search</span></div>Search</div>
<div class="nitem"><div class="pill"><span class="material-symbols-rounded">notifications</span></div>Alerts</div>
<div class="nitem"><div class="pill"><span class="material-symbols-rounded">mail</span></div>Chats</div>
<div class="nitem"><div class="pill"><span class="material-symbols-rounded">person</span></div>You</div>
</div>
</div></body></html>
