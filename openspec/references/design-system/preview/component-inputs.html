<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Inputs</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded"/>
<style>.card{padding:18px 24px;display:flex;gap:12px;flex-direction:column}
.field{background:var(--surface-container);border-radius:12px 12px 0 0;border-bottom:1px solid var(--outline);padding:8px 16px 10px;position:relative;}
.field .lab{font:500 11px/1 var(--font-body);color:var(--fg-2);}
.field input,.field textarea{border:none;background:transparent;width:100%;font:400 15px/1.3 var(--font-body);color:var(--fg-1);outline:none;padding:4px 0 0;resize:none;}
.field.focused{border-bottom:2px solid var(--sky-50);padding-bottom:9px;}
.field.focused .lab{color:var(--sky-50);}
.row{display:flex;gap:8px;}
.search{display:flex;align-items:center;gap:10px;background:var(--surface-container);border-radius:999px;padding:10px 18px;}
.search input{border:none;background:transparent;outline:none;font:400 15px/1.3 var(--font-body);flex:1;}
.search .material-symbols-rounded{color:var(--fg-2);font-size:20px;}
</style></head><body><div class="card">
<div class="search"><span class="material-symbols-rounded">search</span><input placeholder="Search posts, people, feeds"/></div>
<div class="row">
<div class="field" style="flex:1"><div class="lab">Handle</div><input value="alice.nubecita.app"/></div>
<div class="field focused" style="flex:1"><div class="lab">Display name</div><input value="Alice — ☁︎"/></div>
</div>
</div></body></html>
