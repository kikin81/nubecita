<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>FAB</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded"/>
<style>.card{padding:18px 24px;display:flex;gap:36px;align-items:center;background:var(--surface-container-low);}
.fab{background:var(--sky-50);color:#fff;border:none;cursor:pointer;box-shadow:var(--elev-3);display:inline-flex;align-items:center;justify-content:center;gap:8px;font:600 14px/1 var(--font-body);}
.fab .material-symbols-rounded{font-size:24px;font-variation-settings:'FILL' 0,'wght' 500;}
.sm{width:40px;height:40px;border-radius:12px;}
.md{width:56px;height:56px;border-radius:16px;}
.lg{width:80px;height:80px;border-radius:24px;}
.ext{height:56px;padding:0 20px;border-radius:16px;}
</style></head><body><div class="card">
<button class="fab sm"><span class="material-symbols-rounded" style="font-size:18px">edit</span></button>
<button class="fab md"><span class="material-symbols-rounded">edit</span></button>
<button class="fab lg"><span class="material-symbols-rounded" style="font-size:32px">edit</span></button>
<button class="fab ext"><span class="material-symbols-rounded">edit</span>New post</button>
<div class="body-medium muted" style="max-width:200px;margin-left:auto">FAB morphs into a bottom sheet on tap (spring 500 ms).</div>
</div></body></html>
