<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Tertiary</title>
<style>
.card{padding:20px 24px;}
.scale{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border-radius:var(--shape-md);overflow:hidden;height:72px;}
.sw{display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font:600 10px/1 var(--font-body);}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.dot{width:18px;height:18px;border-radius:999px;background:#6250B0;}
</style></head><body><div class="card">
<div class="header"><div class="row" style="gap:10px"><div class="dot"></div><div class="title-medium">Lilac — tertiary</div></div><div class="mono">subtle third accent</div></div>
<div class="scale">
<div class="sw" style="background:#4A3880;color:#fff">30</div>
<div class="sw" style="background:#6250B0;color:#fff">40</div>
<div class="sw" style="background:#7B6AD0;color:#fff">50</div>
<div class="sw" style="background:#B5A8F0;color:#fff">70</div>
<div class="sw" style="background:#E5DEFF;color:#4A3880">90</div>
<div class="sw" style="background:#F3EFFF;color:#4A3880">95</div>
</div>
</div></body></html>
