<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Secondary scale</title>
<style>
.card{padding:20px 24px;}
.scale{display:grid;grid-template-columns:repeat(12,1fr);gap:0;border-radius:var(--shape-md);overflow:hidden;height:72px;}
.sw{display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font:600 10px/1 var(--font-body);}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.dot{width:18px;height:18px;border-radius:999px;background:#C06C00;}
</style></head><body><div class="card">
<div class="header"><div class="row" style="gap:10px"><div class="dot"></div><div class="title-medium">Peach — secondary</div></div><div class="mono">warm counterweight</div></div>
<div class="scale">
<div class="sw" style="background:#2B1100;color:#fff">0</div>
<div class="sw" style="background:#3E1C00;color:#fff">10</div>
<div class="sw" style="background:#5B2D00;color:#fff">20</div>
<div class="sw" style="background:#7B4100;color:#fff">30</div>
<div class="sw" style="background:#9C5600;color:#fff">40</div>
<div class="sw" style="background:#C06C00;color:#fff">50</div>
<div class="sw" style="background:#E38412;color:#fff">60</div>
<div class="sw" style="background:#FFA04D;color:#3E1C00">70</div>
<div class="sw" style="background:#FFB787;color:#3E1C00">80</div>
<div class="sw" style="background:#FFDCC2;color:#3E1C00">90</div>
<div class="sw" style="background:#FFEDE0;color:#3E1C00">95</div>
<div class="sw" style="background:#FFF8F4;color:#3E1C00">98</div>
</div>
</div></body></html>
