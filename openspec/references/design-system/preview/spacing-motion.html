<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Motion</title>
<style>.card{padding:20px 24px;}
.track{height:8px;background:var(--surface-container-high);border-radius:999px;position:relative;margin:14px 0 6px;}
.dot{position:absolute;top:-6px;width:20px;height:20px;border-radius:999px;background:var(--sky-50);box-shadow:var(--elev-2);animation-duration:2.2s;animation-iteration-count:infinite;animation-direction:alternate;}
.d1{animation-name:m1;animation-timing-function:cubic-bezier(0.2, 0, 0, 1);}
.d2{animation-name:m1;animation-timing-function:linear(0, 0.007, 0.030, 0.080 2.6%, 0.25 5.3%, 0.63 10%, 1.06 17%, 1.20 21%, 1.25 24%, 1.22 27%, 1.08 34%, 1.00 41%, 0.97 46%, 0.98 56%, 1.00);}
.d3{animation-name:m1;animation-timing-function:linear(0, 0.18, 0.52, 0.88, 1.08, 1.12, 1.08, 1.03, 1.0);}
@keyframes m1 {from {left:0}to{left:calc(100% - 20px)}}
.name{font:600 11px/1 var(--font-body);color:var(--fg-2);}
.v{font:500 10px/1 var(--font-mono);color:var(--fg-3)}
</style></head><body><div class="card">
<div class="title-medium" style="margin-bottom:4px">Motion — springs</div>
<div><div class="name">standard</div><div class="track"><div class="dot d1"></div></div><div class="v">cubic-bezier(.2,0,0,1) · 300ms</div></div>
<div><div class="name">bouncy (taps, celebrations)</div><div class="track"><div class="dot d2"></div></div><div class="v">spring, overshoot 25%</div></div>
<div><div class="name">slow (sheets, transitions)</div><div class="track"><div class="dot d3"></div></div><div class="v">spring, overshoot 12%</div></div>
</div></body></html>
