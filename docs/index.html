<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nubecita</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; line-height: 1.6; }
        h1 { margin-bottom: 0.25rem; }
        .subtitle { color: #666; margin-top: 0; }
        code { background: #f4f4f4; padding: 0.15rem 0.35rem; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Nubecita</h1>
    <p class="subtitle">A fast, lightweight, native Android client for Bluesky and the AT Protocol.</p>
    <p>
        <a href="https://github.com/kikin81/nubecita">Source on GitHub</a>
    </p>
    <h2>OAuth</h2>
    <p>
        Nubecita authenticates with Bluesky via AT Protocol OAuth 2.0 (PAR + PKCE + DPoP).
        The client metadata is served at
        <a href="oauth/client-metadata.json"><code>oauth/client-metadata.json</code></a>.
    </p>
</body>
