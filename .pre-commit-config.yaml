# Pre-commit config. Install once with:
#   pre-commit install
#   pre-commit install --hook-type commit-msg
#   pre-commit install --hook-type pre-push
# Run across the whole repo with: `pre-commit run --all-files`

# Skip generated/vendored trees globally. Room exports its DB schema JSON under
# core/database/schemas/ — generated, committed artifacts that KSP writes
# without a trailing newline, so the formatting hooks (end-of-file-fixer,
# trailing-whitespace, …) must not rewrite them and fail CI. (nubecita-vfku)
exclude: |
  (?x)^(
    .*/build/.*|
    .*/\.gradle/.*|
    node_modules/.*|
    core/database/schemas/.*\.json
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        # AndroidX baseline profile dumps (startup-prof.txt + baseline-prof.txt)
        # are generated artifacts the androidx.baselineprofile plugin writes
        # into `src/<variant>/generated/baselineProfiles/` for committing
        # (the plugin defaults to `saveInSrc = true`). They run several MB
        # for an app of any size — fingerprint-style content where the size
        # is inherent, not a smell. Excluding them here keeps the 500 KB
        # budget intact for everything else.
        #
        # Also exclude fastlane/frameit_assets/* — the title font (Arial-Bold.ttf)
        # and brand backdrop are intentional binary inputs to the marketing-
        # screenshot framing pipeline; the framed outputs themselves are JPGs
        # kept comfortably under the budget.
        exclude: '^(.+/src/.+/generated/baselineProfiles/.+-prof\.txt|fastlane/frameit_assets/.+\.(ttf|png))$'
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: '\.bat$'

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - "@open-turo/commitlint-config-conventional"

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Spotless + ktlint runs via the existing Gradle wiring so the config lives
  # in one place (build.gradle.kts). pass_filenames is false because Gradle's
  # spotless task already knows what to lint.
  - repo: local
    hooks:
      - id: spotless
        name: spotless (ktlint)
        entry: ./gradlew spotlessApply
        language: system
        files: '\.(kt|kts)$'
        pass_filenames: false

      - id: openspec-validate
        name: openspec validate (strict)
        entry: openspec validate --all --strict
        language: node
        additional_dependencies: ["@fission-ai/openspec@1.4.1"]
        files: '^openspec/'
        pass_filenames: false

      - id: brand-progress-indicator
        name: brand progress indicator (no raw indeterminate spinners)
        # Greps production Kotlin outside :designsystem for raw
        # Circular(Wavy)ProgressIndicator and fails unless the call carries a
        # `// nubecita-allow-raw-progress: <reason>` opt-out. Keeps every
        # "content is loading" spinner on NubecitaWavyProgressIndicator. Pure
        # shell (no Gradle), so it runs on every commit; pass_filenames is false
        # because the script scans the whole src/main tree itself.
        entry: ./scripts/check_progress_indicators.sh
        language: system
        files: '\.kt$'
        pass_filenames: false

      - id: screenshot-test-compile
        name: screenshot test sources compile
        # compileProductionDebugScreenshotTestKotlin specifically — the
        # umbrella compileDebugScreenshotTestSources task hits a known AGP
        # bug with the compose screenshot plugin alpha (mergedManifest not
        # set). The `Production` qualifier disambiguates :app's `environment`
        # flavor dimension (nubecita-crmi.6); without it the unflavored
        # `compileDebugScreenshotTestKotlin` form errors with "task
        # 'compileDebugScreenshotTestKotlin' is ambiguous in project ':app'."
        entry: ./gradlew :app:compileProductionDebugScreenshotTestKotlin
        language: system
        stages: [pre-push]
        files: '\.(kt|kts)$'
        pass_filenames: false
